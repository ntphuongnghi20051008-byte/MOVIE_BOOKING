<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Movie Booking</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    font-family:Arial;
}

.login-box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#0cb077;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#099666;
}

#msg{
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🎬 MOVIE BOOKING</h2>

    <input type="text" id="username" placeholder="Tài khoản">
    <input type="password" id="password" placeholder="Mật khẩu">

    <button onclick="login()">Đăng nhập</button>

    <p id="msg"></p>
</div>

<script>

// TẠO TÀI KHOẢN MẪU (chỉ tạo 1 lần)
if(!localStorage.getItem("admin")){
    localStorage.setItem("admin","123");
}

// ===== HÀM LOGIN =====
function login(){

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(localStorage.getItem(u) == p){

        // Lưu trạng thái đăng nhập
        localStorage.setItem("login","true");
        localStorage.setItem("currentUser", u);

        // Chuyển sang trang movie
        window.location.href = "movie.html";

    }else{
        document.getElementById("msg").innerText =
        "Sai tài khoản hoặc mật khẩu!";
    }
}

</script>

</body>
</html>
