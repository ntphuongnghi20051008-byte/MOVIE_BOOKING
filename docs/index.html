<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Movie Booking</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background: rgba(0,0,0,0.75);
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
}

h2{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    font-size:15px;
}

input:focus{
    outline:none;
    border:1px solid #09e5cf;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn{
    background:#e50914;
    color:white;
}

.login-btn:hover{
    background:#ff1e27;
}

.register-btn{
    background:#09e5cf;
    color:black;
}

.register-btn:hover{
    background:#00c9b7;
}

.toggle-pass{
    font-size:13px;
    cursor:pointer;
    text-align:right;
    color:#09e5cf;
}

.message{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#ff4c4c;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎬 MOVIE BOOKING</h2>

    <input type="text" id="user" placeholder="Tên tài khoản">
    <input type="password" id="pass" placeholder="Mật khẩu">
    <div class="toggle-pass" onclick="togglePassword()">👁 Hiện mật khẩu</div>

    <button class="login-btn" onclick="login()">Đăng nhập</button>
    <button class="register-btn" onclick="register()">Đăng ký</button>

    <div class="message" id="msg"></div>

    <div class="footer">
        © 2025 OWE Project
    </div>
</div>

<script>
let user = document.getElementById("user");
let pass = document.getElementById("pass");
let msg = document.getElementById("msg");

/* ===== ĐĂNG KÝ ===== */
function register(){
    let u = user.value.trim();
    let p = pass.value.trim();

    if(u === "" || p === ""){
        msg.innerText = "Vui lòng nhập đầy đủ thông tin!";
        return;
    }

    if(p.length < 4){
        msg.innerText = "Mật khẩu tối thiểu 4 ký tự!";
        return;
    }

    if(localStorage.getItem(u)){
        msg.innerText = "Tài khoản đã tồn tại!";
        return;
    }

    localStorage.setItem(u, p);
    msg.style.color = "lightgreen";
    msg.innerText = "Đăng ký thành công! Hãy đăng nhập.";
}

/* ===== ĐĂNG NHẬP ===== */
function login(){
    let u = user.value.trim();
    let p = pass.value.trim();

    if(localStorage.getItem(u) === p){
        localStorage.setItem("currentUser", u);
        window.location.href = "movie.html";
    }else{
        msg.style.color = "#ff4c4c";
        msg.innerText = "Sai tài khoản hoặc mật khẩu!";
    }
}

/* ===== HIỆN / ẨN MẬT KHẨU ===== */
function togglePassword(){
    if(pass.type === "password"){
        pass.type = "text";
    }else{
        pass.type = "password";
    }
}
</script>

</body>
</html>
